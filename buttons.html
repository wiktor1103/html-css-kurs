<style>
  .join-button{
    background-color: white;
    border-color: rgb(0, 140, 255);
    border-style: solid;
    border-width: 1px;
    color: rgb(42, 128, 239);
    border-radius: 2px;
    cursor: pointer;
    margin-right: 8px;
    transition: background-color 150ms, opacity 150ms, color 150ms;
    padding-top: 9px;
    padding-bottom: 9px;
    padding-left: 16px;
    padding-right: 16px;

  }

  .join-button:hover {
    background-color: rgb(42, 128, 239);
    color: white;
  }

  .join-button:active{
    opacity: 0.7;
  }

  .subscribe-button {
    transition: opacity 150ms;
    background-color: rgb(200, 0, 0);
    color: white;
    border: none;
    border-radius: 2px;
    cursor: pointer;
    margin-right: 8px;
    padding-top: 10px;
    padding-bottom: 10px;
    padding-left: 16px;
    padding-right: 16px;
    vertical-align: top;
  }
  .subscribe-button:hover {
    opacity: 0.8;
  }
  .subscribe-button:active{
    opacity: 0.6;
  }
  .tweet-button {
    background-color: rgb(38, 125, 231);
    color: white;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    font-weight: bold;
    font-size: 15px;
    transition: box-shadow 0.2s;
    vertical-align: top;
  }
  .tweet-button:hover {
    box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.3);

  }
</style>

<button class="subscribe-button">
  SUBSCRIBE
</button>

<button class="join-button">
  JOIN
</button>

<button class="tweet-button">
  Tweet
</button>
