<!doctype html>
<html>
  <head>
    <title>First Website</title>
    <style>
      p {
        font-family: Arial, Helvetica, sans-serif;
        margin-top: 0px;
        margin-bottom: 0px;
      }
      .video-title {
        font-size: 17px;
        width: 300px;
        line-height: 24px;
        margin-bottom: 5px;
      }
      .video-stats {
        font-size: 14px;
        color: rgb(96, 96, 96);
      }

      .video-author {
        color: rgb(96, 96, 96);
        font-size: 14px;
        margin-top: 5px;
        margin-bottom: 15px;
      }

      .video-description {
        width: 280px;
        font-size: 14px;
        color: rgb(96, 96, 96);
        line-height: 16px;
        margin-bottom: 100px;
      }

      .video-note {
        font-size: 12px;
        background-color: red;
        color: white;
        text-align: center;
        padding: 10px;
      }

      .shop-now:hover {
        text-decoration: underline;
        transition: 0.5;
        cursor: pointer;
        margin-left: 10px;
      }
    </style>
  </head>

  <body>
    <p class="video-title">
      Talking Tech and AI with Google CEO Sundar Pichai!
    </p>
    <p class="video-stats">3.4M views &middot; 6 months ago</p>
    <p class="video-author">Marques Brownlee &#x2713;</p>
    <p class="video-description">
      Talking tech and AI on the heels of Google I/O. Also a daily driver phone
      reveal from Google's CEO. Shoutout to Sundar!
    </p>
    <p class="video-note">
      Shop early for the best selection of holiday favourites.
      <span class="shop-now">Shop now &GT;</span>
    </p>
  </body>
</html>
